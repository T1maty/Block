version: '3'

services:




  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: block_db
      POSTGRES_HOST: db
    ports:
      - "5432:5432"
    restart: unless-stopped
  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "7000:7000"
    depends_on:
      - db
  frontend:
    build: ./frontend
    container_name: frontend_server
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: "on-failure"



  nginx:
    build: ./nginx
    container_name: nginx_server
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./static:/app/static
    restart: "on-failure"



  

